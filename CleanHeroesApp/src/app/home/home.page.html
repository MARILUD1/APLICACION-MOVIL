<ion-card>
  <ion-card-header>
    <ion-card-title>📸 Cámara de Reciclaje</ion-card-title>
  </ion-card-header>
  <ionCardContent>
    <ionButton 
      expand="block" 
      color="primary"
      (click)="tomarFotoReciclaje()"
      [disabled]="cargandoFoto">
      {{ cargandoFoto ? '📸 Abriendo...' : '📷 Tomar Foto' }}
    </ionButton>
    
    <!-- Mostrar foto tomada -->
    <div *ngIf="fotoReciente" class="foto-preview" style="margin-top: 15px;">
      <ionImg [src]="fotoReciente" alt="Foto tomada" style="max-width: 100%; border-radius: 8px;"></ionImg>
      <ionText color="success">
        <p style="margin-top: 8px;">✅ Foto tomada y guardada</p>
      </ionText>
    </div>
  </ionCardContent>
</ion-card>
