<ion-header>
  <ion-toolbar color="success">
    <ion-title>Registro de Usuario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="registroForm" (ngSubmit)="enviarRegistro()">
    <ion-list>
      <ion-item>
        <ion-input label="Nombre" labelPlacement="stacked" formControlName="nombre"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-input label="Correo" labelPlacement="stacked" formControlName="correo"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="registroForm.get('correo')?.hasError('correoTomado')">
        <small style="padding-left: 15px;">Este correo ya está registrado.</small>
      </ion-text>

      <ion-item>
        <ion-input label="Dirección" labelPlacement="stacked" formControlName="direccion"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input label="Contraseña" labelPlacement="stacked" type="password" formControlName="password"></ion-input>
      </ion-item>

      <ion-item>
        <ion-input label="Confirmar Contraseña" labelPlacement="stacked" type="password" formControlName="confirmarPassword"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="registroForm.hasError('noCoincide') && registroForm.get('confirmarPassword')?.touched">
        <small style="padding-left: 15px;">Las contraseñas no coinciden.</small>
      </ion-text>
    </ion-list>

    <ion-grid>
      <ion-row>
        <ion-col size="2">
          <ion-button expand="block" fill="outline" color="success" routerLink="/onboarding">ATRÁS</ion-button>
        </ion-col>
        <ion-col size="2">
          <ion-button expand="block" color="success" [disabled]="registroForm.invalid" routerLink="/login">SIGUIENTE</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
