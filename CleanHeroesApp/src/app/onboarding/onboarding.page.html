<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>Bienvenido a CleanHeroes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85%; text-align: center;">
    <ion-icon name="leaf-outline" style="font-size: 100px;" color="success"></ion-icon>
    <h1 style="font-weight: bold; font-size: 28px; margin-top: 20px;">Yanzatza Limpio</h1>
    <h1 style="color: #666; margin-bottom: 30px;">Recompensas por mantener limpia tu ciudad.</h1>

    <ion-grid style="width: 100%; max-width: 400px;">
      <ion-row>
        <ion-col size="12">
          <ion-button expand="block" color="success" routerLink="/registro">SIGUIENTE</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
