<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>Permisos Necesarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display: flex; flex-direction: column; align-items: center; min-height: 85%; text-align: center;">
    
    <!-- Ícono Principal -->
    <ion-icon name="shield-checkmark-outline" style="font-size: 80px;" color="primary"></ion-icon>
    
    <!-- Título -->
    <h1 style="font-weight: bold; font-size: 24px; margin: 20px 0;">Tu Privacidad es Importante</h1>
    <p style="color: #666; margin-bottom: 30px;">Necesitamos estos permisos para funcionar</p>
    
    <!-- Lista de Permisos -->
    <ion-list style="width: 100%; max-width: 400px; text-align: left; margin-bottom: 30px;">
      <ion-item lines="none">
        <ion-icon name="location-outline" color="primary" slot="start" style="font-size: 24px;"></ion-icon>
        <ion-label style="margin-left: 10px;">
          <strong>Ubicación</strong><br/>
          <small color="medium">Para mostrar misiones cercanas a ti</small>
        </ion-label>
      </ion-item>
      
      <ion-item lines="none">
        <ion-icon name="camera-outline" color="primary" slot="start" style="font-size: 24px;"></ion-icon>
        <ion-label style="margin-left: 10px;">
          <strong>Cámara</strong><br/>
          <small color="medium">Para evidenciar tus acciones de limpieza</small>
        </ion-label>
      </ion-item>
      
      <ion-item lines="none">
        <ion-icon name="notifications-outline" color="primary" slot="start" style="font-size: 24px;"></ion-icon>
        <ion-label style="margin-left: 10px;">
          <strong>Notificaciones</strong><br/>
          <small color="medium">Para recordarte misiones diarias</small>
        </ion-label>
      </ion-item>
    </ion-list>

    <!-- Botones de Navegación -->
    <ion-grid style="width: 100%; max-width: 400px;">
      <ion-row>
        <ion-col size="6">
          <ion-button expand="block" fill="outline" color="success" routerLink="/onboarding-benefits">
            ATRÁS
          </ion-button>
        </ion-col>
        <ion-col size="6">
          <ion-button expand="block" color="success" routerLink="/registro" (click)="onFinish()">
            COMENZAR
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
    
  </div>
</ion-content>
