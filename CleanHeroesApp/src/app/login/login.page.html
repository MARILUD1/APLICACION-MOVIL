<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Inicio de Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80%; text-align: center;">
    
    <h2>CleanHeroes Lite</h2>
    <p style="color: #666; margin-bottom: 20px;">Ingresa tus credenciales</p>

    <form [formGroup]="loginForm" style="width: 100%; max-width: 400px;">
      <ion-list style="border-radius: 10px;">
        <ion-item>
          <ion-input label="Correo" labelPlacement="stacked" formControlName="correo" placeholder="ejemplo@correo.com"></ion-input>
        </ion-item>
        <ion-text color="danger" *ngIf="loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched">
          <small style="padding-left: 15px;">Ingrese un correo válido.</small>
        </ion-text>

        <ion-item>
          <ion-input label="Contraseña" labelPlacement="stacked" type="password" formControlName="password" placeholder="********"></ion-input>
        </ion-item>
        <ion-text color="danger" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small style="padding-left: 15px;">La contraseña debe tener al menos 8 caracteres.</small>
        </ion-text>
      </ion-list>

      <ion-grid style="margin-top: 25px;">
        <ion-row>
          <ion-col size="6">
            <ion-button expand="block" fill="outline" color="primary" routerLink="/registro">
              ATRÁS
            </ion-button>
          </ion-col>
          <ion-col size="6">
            <ion-button expand="block" color="primary" [disabled]="loginForm.invalid" (click)="ingresar()">
              INGRESAR
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </div>
</ion-content>
